<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Asistente de Ventas - Cursos de Programación</title>
    <link rel="stylesheet" href="css/chat.css">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1995/1995573.png">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🎓 Asesor de Cursos</h1>
            <p>Tu asistente para elegir el mejor curso de programación</p>
            <button id="clearHistoryBtn" class="clear-btn">🗑️ Limpiar historial</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Los mensajes se renderizan dinámicamente -->
            <div class="welcome-message">
                🤖 ¡Hola! Soy tu asesor de ventas. Pregúntame sobre cursos de Python, JavaScript, desarrollo web, ciencia de datos y más. Estoy aquí para ayudarte a encontrar el curso ideal.
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="userInput" placeholder="Escribe tu mensaje..." rows="1" maxlength="2000"></textarea>
            <button id="sendBtn" class="send-btn">Enviar ➤</button>
        </div>
        <div class="status-indicator" id="statusIndicator"></div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
